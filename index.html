<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otimizador de Conteúdo Multi-Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            padding: 2.5rem;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            text-align: center;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            line-height: 1.5;
            background-color: #fff;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 200px;
        }

        button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            letter-spacing: 0.5px;
        }

        button:hover:not(:disabled) {
            background: #34495e;
            transform: scale(1.02);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .status-message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            transition: opacity 0.3s;
            display: none;
        }

        .status-message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .status-message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .status-message.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; display: block; }

        .footer {
            margin-top: 2rem;
            text-align: center;
            color: #95a5a6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Otimizador de Conteúdo</h1>
        <div class="subtitle">Selecione o blog e transforme ideias em artigos</div>

        <div class="form-group">
            <label for="blog-destino">🏢 Escolha o Blog de Destino:</label>
            <select id="blog-destino">
                <option value="saude">Direito da Saúde</option>
                <option value="previdenciario">Direito Previdenciário</option>
                <option value="tributario">Direito Tributário</option>
            </select>
        </div>

        <div class="form-group">
            <label for="imagem-url">🖼️ URL da Imagem de Capa:</label>
            <input type="text" id="imagem-url" placeholder="Ex: https://exemplo.com/imagem.jpg" />
        </div>

        <div class="form-group">
            <label for="texto">📝 Digite seu texto base:</label>
            <textarea id="texto" placeholder="Ex: ideias sobre o tema escolhido para transformar em artigo..."></textarea>
        </div>

        <button id="enviarBtn">🚀 Enviar para Geração</button>

        <div id="status" class="status-message"></div>

        <div class="footer">
            ⚡ O texto será enviado para o fluxo n8n do blog selecionado.
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const textoTextarea = document.getElementById('texto');
            const imagemUrlInput = document.getElementById('imagem-url');
            const blogSelect = document.getElementById('blog-destino');
            const enviarBtn = document.getElementById('enviarBtn');
            const statusDiv = document.getElementById('status');

            // Mapeamento de URLs dos Webhooks
            const webhookUrls = {
                'saude': 'https://tyrannisingly-mesorrhine-anaya.ngrok-free.dev/webhook-test/blog',
                'previdenciario': 'https://tyrannisingly-mesorrhine-anaya.ngrok-free.dev/webhook-test/blog-previdenciario',
                'tributario': 'https://tyrannisingly-mesorrhine-anaya.ngrok-free.dev/webhook-test/blog-tributario'
            };

            function showMessage(message, type) {
                statusDiv.textContent = message;
                statusDiv.className = 'status-message ' + type;
            }

            enviarBtn.addEventListener('click', async function() {
                const texto = textoTextarea.value;
                const imagemUrl = imagemUrlInput.value;
                const selectedBlog = blogSelect.value;
                const activeWebhook = webhookUrls[selectedBlog];

                if (!texto || texto.trim().length === 0) {
                    showMessage('Por favor, digite algum texto antes de enviar.', 'error');
                    return;
                }

                enviarBtn.disabled = true;
                showMessage(`Enviando para o blog ${selectedBlog.toUpperCase()}... Aguarde.`, 'info');

                const payload = {
                    texto: texto,
                    imagem_manual: imagemUrl,
                    blog_origem: selectedBlog
                };

                try {
                    const response = await fetch(activeWebhook, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        showMessage(`✅ Sucesso! O artigo para ${selectedBlog.toUpperCase()} está sendo gerado.`, 'success');
                        textoTextarea.value = '';
                        imagemUrlInput.value = '';
                    } else {
                        const errorText = await response.text();
                        showMessage(`❌ Erro no servidor: ${response.status}.`, 'error');
                    }
                } catch (error) {
                    showMessage(`❌ Falha de conexão. Verifique se o n8n está online.`, 'error');
                } finally {
                    setTimeout(() => { enviarBtn.disabled = false; }, 2000);
                }
            });

            // Atalho Ctrl+Enter
            textoTextarea.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    enviarBtn.click();
                }
            });
        });
    </script>
</body>
</html>
