<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigo | Kayo Melo Advogados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0f1b35;
            --navy-mid: #1a2744;
            --gold: #c4a35a;
            --white: #f4f6fb;
            --text-primary: #e8edf7;
            --text-secondary: #8fa8d4;
        }

        body {
            background-color: var(--navy);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        /* Header Estilo Premium */
        .post-navbar {
            padding: 20px;
            background: rgba(15, 27, 53, 0.95);
            border-bottom: 1px solid rgba(196, 163, 90, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .back-btn:hover { color: var(--white); }

        /* Container do Artigo */
        .article-container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .category-tag {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            font-weight: 600;
            display: block;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            color: var(--white);
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .post-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 40px;
            border-left: 2px solid var(--gold);
            padding-left: 15px;
        }

        .main-image {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid rgba(196, 163, 90, 0.3);
            margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Conteúdo do Texto (IA) */
        .article-content {
            font-size: 1.15rem;
            color: var(--text-primary);
            opacity: 0.95;
        }

        .article-content p { margin-bottom: 25px; }
        
        .article-content h2, .article-content h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-top: 40px;
        }

        /* Footer simples */
        footer {
            margin-top: 100px;
            padding: 40px;
            text-align: center;
            border-top: 1px solid rgba(196, 163, 90, 0.1);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <nav class="post-navbar">
        <a href="index.html" class="back-btn">← Voltar ao Início</a>
        <div style="color: var(--gold); font-family: 'Playfair Display'; font-weight: bold;">KAYO MELO</div>
    </nav>

    <main class="article-container">
        <span id="post-categoria" class="category-tag">Direito à Saúde</span>
        <h1 id="post-titulo">Carregando título...</h1>
        
        <div class="post-meta">
            Publicado em <span id="post-data">--/--/--</span> • Leitura de 5 min
        </div>

        <img id="post-imagem" src="" alt="Imagem do post" class="main-image" style="display:none;">

        <div id="post-conteudo" class="article-content">
            </div>
    </main>

    <footer>
        &copy; 2024 Kayo Melo Advogados. Todos os direitos reservados.
    </footer>

    <script>
        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            try {
                const res = await fetch('posts.json');
                const posts = await res.json();
                const post = posts[id];

                if (post) {
                    document.title = post.titulo + " | Kayo Melo";
                    document.getElementById('post-titulo').innerText = post.titulo;
                    document.getElementById('post-categoria').innerText = post.categoria;
                    document.getElementById('post-data').innerText = post.data;
                    document.getElementById('post-conteudo').innerHTML = post.conteudo;
                    
                    const img = document.getElementById('post-imagem');
                    if(post.imagem) {
                        img.src = post.imagem;
                        img.style.display = 'block';
                    }
                } else {
                    document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:100px;'>Artigo não encontrado.</h1>";
                }
            } catch (e) {
                console.error("Erro:", e);
            }
        }
        loadArticle();
    </script>
</body>
</html>
